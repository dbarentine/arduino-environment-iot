; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = mkrwifi1010

[env:mkrwifi1010]
build_type = release
platform = atmelsam
board = mkrwifi1010
framework = arduino
monitor_speed = 115200
; Apply the intended C++17 standard (the [common] flags were previously
; defined but never wired into this environment).
build_flags = ${common.build_flags}
build_unflags = ${common.build_unflags}
lib_deps =
	arduino-libraries/WiFiNINA@^1.8.13
	; ArduinoHttpClient is used directly by main.cpp; it was previously only
	; pulled in transitively by the old Arduino_ConnectionHandler 0.6.x.
	arduino-libraries/ArduinoHttpClient@^0.6.0
	arduino-libraries/Arduino_DebugUtils@^1.1.0
	; 0.6.5 was yanked from the registry; 0.7.7 is the nearest still-published
	; release on the same 0.x API.
	arduino-libraries/Arduino_ConnectionHandler@^0.7.7
	arduino-libraries/RTCZero@^1.6.0
	LibPrintf=https://github.com/embeddedartistry/arduino-printf/archive/1.2.8.tar.gz
	Seeed_SHT35=https://github.com/Seeed-Studio/Seeed_SHT35/archive/refs/tags/v1.0.2.tar.gz
	FreeMemory=https://github.com/mpflaga/Arduino-MemoryFree/archive/refs/heads/master.zip
	contrem/arduino-timer@^2.3.1
	seeed-studio/Grove - Laser PM2.5 Sensor HM3301@^1.0.3
	robtillaart/TCA9548@^0.1.2
	adafruit/Adafruit SleepyDog Library@^1.8.4

; Debug environment for the Atmel-ICE (SWD) probe. See docs/DEBUGGING.md.
; It reuses everything from the release env and only flips what on-chip
; debugging needs:
;   - build_type = debug     -> -Og -g3, and (critically) tells the atmelsam
;     platform to KEEP tool-openocd instead of deleting it. The base env pins
;     build_type = release, which is what makes `pio debug` on that env crash
;     with `KeyError: 'tool-openocd'`.
;   - debug_tool / upload_protocol = atmel-ice -> flash and debug over SWD
;     through OpenOCD's CMSIS-DAP interface (the Atmel-ICE speaks CMSIS-DAP).
; Debug builds are larger; watch the flash/RAM report on link (release is
; already ~77% flash). Keep flashing production firmware over USB with the
; default `mkrwifi1010` env.
[env:mkrwifi1010_debug]
extends = env:mkrwifi1010
build_type = debug
debug_tool = atmel-ice
upload_protocol = atmel-ice
; Halt at the top of setup() when the session attaches, instead of free-running.
debug_init_break = tbreak setup

[common]
; Use the GNU C++17 dialect: the Arduino SAMD core relies on GNU extensions
; (e.g. the `ushort` typedef), so the strict `-std=c++17` does not compile.
build_flags = -std=gnu++17
build_unflags = -std=gnu++11
